<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Kamban Circuito Acopio</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#001b2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<header>
  <h1>KAMBAN CIRCUITO ACOPIO</h1>
  <div>Registro QR ver. 2.000 CR- offline</div>
</header>

<section class="topStats">
  <div><small>Red</small><b id="redEstado">...</b></div>
  <div><small>Pend.</small><b id="pendientesSync">0</b></div>
  <div><small>Último</small><b id="ultimoMin">--</b></div>
</section>

<main>
  <section class="card">
    <label>Estación</label>
    <select id="estacion">
      <option>BALANZA</option>
      <option>DESCARGUIO</option>
      <option>CHANCADO</option>
      <option>MUESTREO</option>
      <option>SECADO</option>
      <option>PULVERIZADO</option>
      <option>CUARTEOSELLADO</option>
      <option>ATENCION AL CLIENTE</option>
    </select>

    <label>Operador</label>
    <input id="operador" autocomplete="off" placeholder="Ingrese operador">

    <label>Código QR / digitado</label>
    <input id="codigo" class="scanInput" autocomplete="off" placeholder="ESCANEAR AQUÍ">
    <div class="estado" id="estadoEntrada"></div>

    <div class="modoBox" id="modoBox">
      <div class="modoBtns">
        <button id="modoInicioBtn" class="btnInicio activo">INICIO</button>
        <button id="modoParadaBtn" class="btnParada">PARADA</button>
        <button id="modoStockBtn" class="btnStock">EN STOCK</button>
        <button id="modoSalidaStockBtn" class="btnSalida">SALIDA STOCK</button>
      </div>
      <div id="modoTexto" class="modoTexto">Modo: INICIO</div>
    </div>

    <div class="ultimoBox">
      <small>Último registro</small>
      <div id="ultimoCodigo" class="ultimoCodigo">--</div>
      <div id="ultimoEvento" class="ultimoEvento">--</div>
      <div id="ultimoDetalle">--</div>
    </div>

    <div class="pendientesBox">
      <h3>⚠ Pendientes por finalizar</h3>
      <div id="pendientesResumen">Sin pendientes.</div>
      <div id="pendientesTabla"></div>
    </div>
  </section>

  <section class="card">
    <h3>Registros locales</h3>
    <div class="tableWrap" id="tablaLocal"></div>
  </section>
</main>

<button class="fabTrack" id="seguimientoBtn">📊</button>
<button class="fabAdmin" id="adminBtn">⚙</button>

<div class="modal hide" id="seguimientoModal">
  <div class="modalBox wide">
    <div class="modalTop">
      <h3>Seguimiento Kanban</h3>
      <button id="cerrarSeguimientoBtn" class="closeBtn">Cerrar</button>
    </div>
    <div id="fuenteSeguimiento" class="note"></div>
    <div class="kpiGrid" id="kpiSeguimiento"></div>
    <div class="trackFilters">
      <select id="filtroEstado">
        <option value="TODOS">TODOS</option>
        <option value="EN PROCESO">EN PROCESO</option>
        <option value="EN PARADA">EN PARADA</option>
        <option value="EN STOCK">EN STOCK</option>
        <option value="DEMORA">DEMORA</option>
        <option value="FINALIZADO">FINALIZADO</option>
      </select>
      <button id="actualizarSeguimientoBtn">ACTUALIZAR</button>
    </div>
    <div id="kanban" class="kanbanWrap"></div>
  </div>
</div>

<div class="modal hide" id="adminModal">
  <div class="modalBox">
    <div class="modalTop">
      <h3>Administrador</h3>
      <button id="cerrarAdminBtn" class="closeBtn">Cerrar</button>
    </div>
    <div id="adminInfo" class="note"></div>
    <button id="probarSyncBtn">PROBAR RED Y SINCRONIZACIÓN</button>
    <button id="exportarBtn" class="warning">EXPORTAR RESPALDO CSV</button>
    <button id="borradoManualBtn" class="danger">BORRADO MANUAL LOCAL</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utilidades.js"></script>
<script src="js/db.js"></script>
<script src="js/reglas.js"></script>
<script src="js/sincronizacion.js"></script>
<script src="js/seguimiento.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js"));
}
</script>
</body>
</html>
